<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special Message</title>
    <style>
        body {
            background-color: #f9f3f4;
            text-align: center;
            font-family: 'Georgia', serif;
        }

        h1 {
            color: #ed6b86; 
            text-shadow: 2px 2px 4px #c24d63; 
            font-size: 2em;
            margin-bottom: 20px;
            animation: pulse 2s infinite; 
        }

        p {
            color: #4f4f4f;
            font-style: italic;
            font-size: 18px;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
            }
        }
    </style>
</head>
<body>
    <h1>My love for you is like a blooming rose...</h1>
    <p>It grows more beautiful with each passing moment. You are the essence of my happiness.</p>
</body>
</html>
