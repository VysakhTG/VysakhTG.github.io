<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Message</title>
    <style>
        body {
            background-color: #fdf7f9;
            text-align: center;
            font-family: 'Courier New', monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        h1 {
            color: #d93367; 
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        p {
            color: #333;
            font-style: italic;
            font-size: 18px;
            max-width: 600px;
        }

        .ring {
            width: 150px;
            margin-top: 20px;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
            }
        }
    </style>
</head>
<body>
    <h1>Will you make me the happiest person?</h1>
    <p>Every moment with you feels like a dream. Your love is my greatest treasure.</p>
    <img src="ring.png" alt="Engagement Ring" class="ring">
</body>
</html>
