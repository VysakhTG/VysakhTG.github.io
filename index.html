<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A Special Message</title>
    <style>
        body {
            background-color: #fde8eb; 
            text-align: center;
            font-family: 'Verdana', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        h1 {
            color: #ec6b80; 
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        p {
            color: #555;
            font-style: italic;
            font-size: 18px;
            max-width: 80%;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <h1>In the quiet moments of my day, my thoughts are filled with you...</h1>
    <p>Your presence brings warmth to my heart, and your love is the most beautiful part of my life.</p>
</body>
</html>
